<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- Sets the small icon that appears in the browser tab -->
    <link rel="icon" href="https://github.com/favicon.ico" />
    <title>Rubberhose Tier List</title>
    <meta
      name="description"
      content="My personal Rubberhose cartoon tier list"
    />
    <meta name="robots" content="index,follow" />
    <meta property="og:title" content=Your Title" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/" />
    <meta name="twitter:card" content="summary" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Add a table element -->
    <table>
    <!-- Add a caption -->
      <caption>My Ranking of Rubberhose Characters (Real or Inspired)</caption>
    <!-- Add a table head. Inside create a table row. Inside create four table headings with a scope of col. Leave the first one blank. Give the final 3 text. -->
      <thead>
    <tr>
      <th></th>
      <th>Toon 1</th>
      <th>Toon 2</th>
      <th>Toon 3</th>
    </tr>
  </thead>
    <!-- Add a table body. -->
    <!-- Inside tbody create 6 table rows -->
    <!-- Give each row a th with scope of row. Text is S,A,B,C,D,F -->
    <!-- Below the th create table data containing an image. Repeat for every row. -->
    <tbody>
    <tr>
      <th scope="row" class="s">S</th>
      <td><img src="./assets/bendy.jpg" alt="Bendy from Bendy and the Ink Machine"></td>
      <td><img src="./assets/ringading.jpg" alt="Mr. Ring a Ding from Doctor Who"></td>
    </tr>
    <tr>
      <th scope="row" class="a">A</th>
      <td><img src="./assets/crooner.jpg" alt="The Crooner from The Real Tuesday Weld"></td>
      <td><img src="./assets/cuphead.jpg" alt="Cuphead from self-titled game"></td>
      <td><img src="./assets/oswald.jpg" alt="Oswald the Lucky Rabbit"></td>
    </tr>
      <tr>
        <th scope="row" class="b">B</th>
        <td><img src="./assets/felix.jpg" alt="Felix the Cat"></td>
      </tr>
      <tr>
        <th scope="row" class="c">C</th>
        <td><img src="./assets/warners.jpg" alt="Yakko, Wakko, and Dot from Animaniacs"></td>
        <td><img src="./assets/mickey.jpg" alt="Mickey Mouse"></td>
        <td><img src="./assets/bimbo.jpg" alt="Bimbo the Dog"></td>
      </tr>
     <tr>
        <th scope="row" class="d">D</th>
        <td><img src="./assets/spinel.jpg" alt="Spinel from Steven Universe"></td>
        <td><img src="./assets/blossom.jpg" alt="Blossom from IF (2024)"></td>
      </tr>
     <tr>
        <th scope="row" class="f">F</th>
        <td><img src="./assets/kel.jpg" alt="Kel from OR3O - Clover"></td>
      </tr>
    </tbody>
    <!-- Create a table foot -->
    <!-- In tfoot create a tr. Inside add <td colspan="4">Copyright yourname year</td>-->
  <tfoot>
    <tr>
      <td colspan="4">© Isabella Stabile 2026</td>
    </tr>
  </tfoot>
  </table>
  </body>
</html>
